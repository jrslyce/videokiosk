<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Kiosk — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&amp;display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0a0a0a; color: #f2f0ec; font-family: Helvetica, Arial, sans-serif;
         padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', Georgia, serif; color: #c3a878; font-weight: 600;
       font-size: 28px; margin: 0 0 4px; }
  .sub { color: #8b857b; font-size: 14px; margin-bottom: 28px; }
  h2 { color: #c3a878; font-size: 15px; letter-spacing: 1px; text-transform: uppercase;
       margin: 32px 0 12px; border-bottom: 1px solid #26221c; padding-bottom: 8px; }
  label { display: block; color: #cfc9bf; font-size: 13px; margin: 14px 0 5px; }
  input[type=text], textarea, select {
    width: 100%; background: #16130f; color: #f2f0ec; border: 1px solid #322c23;
    border-radius: 8px; padding: 10px 12px; font-size: 15px; font-family: inherit; }
  textarea { min-height: 70px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #c3a878; }
  .row { display: flex; gap: 12px; align-items: center; }
  .row > * { flex: 1; }
  .check { display: flex; align-items: center; gap: 10px; margin-top: 14px; color: #cfc9bf; font-size: 14px; }
  .check input { width: 18px; height: 18px; }
  button { background: #c3a878; color: #14100a; border: none; border-radius: 8px;
           padding: 12px 22px; font-size: 15px; font-weight: 700; cursor: pointer; }
  button:active { transform: scale(0.98); }
  button.secondary { background: #26221c; color: #cfc9bf; font-weight: 400; padding: 10px 16px; font-size: 13px; }
  button:disabled { opacity: 0.5; cursor: default; }
  .save-bar { position: sticky; bottom: 0; background: linear-gradient(180deg, transparent, #0a0a0a 30%);
              padding: 20px 0 8px; margin-top: 32px; display: flex; gap: 12px; align-items: center; }
  .toast { font-size: 14px; }
  .toast.ok { color: #8fce8f; }
  .toast.err { color: #e67c7c; }
  .photo-preview { width: 100%; max-height: 260px; object-fit: cover; border-radius: 10px;
                   border: 1px solid #322c23; display: block; margin-bottom: 10px; background: #16130f; }
  .warn { color: #8b857b; font-size: 12px; margin-top: 6px; }
  a { color: #c3a878; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Video Kiosk Admin</h1>
  <div class="sub">Changes appear on the kiosk within ~10 seconds — no restart needed. Kiosk page: <a href="/" target="_blank">open</a></div>

  <h2>Screen text</h2>
  <label for="eventTitle">Event title</label>
  <input type="text" id="eventTitle">
  <label for="dateBanner">Date banner (under the photo)</label>
  <input type="text" id="dateBanner">
  <label for="promptIdle">Prompt before recording</label>
  <textarea id="promptIdle"></textarea>
  <label for="promptRecording">Instruction during countdown &amp; recording</label>
  <textarea id="promptRecording"></textarea>

  <h2>Photo</h2>
  <img id="photoPreview" class="photo-preview" alt="Current kiosk photo">
  <div class="row">
    <input type="file" id="photoFile" accept="image/jpeg,image/png">
    <button class="secondary" id="uploadPhoto">Upload photo</button>
  </div>
  <div class="warn">JPEG or PNG. Shown on the left side of the kiosk while idle.</div>

  <h2>Camera &amp; microphone</h2>
  <label for="videoDevice">Camera</label>
  <select id="videoDevice"></select>
  <label for="audioDevice">Microphone <span style="color:#8b857b">(switch here when using the handheld mic)</span></label>
  <select id="audioDevice"></select>
  <button class="secondary" id="refreshDevices" style="margin-top:10px">Re-scan devices</button>
  <div class="check">
    <input type="checkbox" id="preview">
    <label for="preview" style="margin:0">Show live preview on the tablet while recording</label>
  </div>
  <div class="warn">Device changes apply to the <em>next</em> recording. Do a quick test clip after switching mics.</div>

  <div class="save-bar">
    <button id="save">Save settings</button>
    <span class="toast" id="toast"></span>
  </div>
</div>

<script>
(function () {
  'use strict';
  var $ = function (id) { return document.getElementById(id); };
  var toast = $('toast');
  var FIELDS = ['eventTitle', 'dateBanner', 'promptIdle', 'promptRecording'];
  var current = {};

  function say(msg, ok) {
    toast.textContent = msg;
    toast.className = 'toast ' + (ok ? 'ok' : 'err');
    if (ok) setTimeout(function () { toast.textContent = ''; }, 4000);
  }

  function fillSelect(sel, options, selected) {
    sel.innerHTML = '';
    var found = false;
    options.forEach(function (name) {
      var o = document.createElement('option');
      o.value = name; o.textContent = name;
      if (name === selected) { o.selected = true; found = true; }
      sel.appendChild(o);
    });
    if (selected && !found) {
      var o = document.createElement('option');
      o.value = selected; o.textContent = selected + ' (not detected right now)';
      o.selected = true;
      sel.appendChild(o);
    }
  }

  function loadDevices() {
    say('Scanning devices…', true);
    return fetch('/api/devices').then(function (r) { return r.json(); }).then(function (d) {
      fillSelect($('videoDevice'), d.video || [], current.videoDevice);
      fillSelect($('audioDevice'), d.audio || [], current.audioDevice);
      say('', true);
    }).catch(function () { say('Could not scan devices', false); });
  }

  function refreshPhoto() {
    $('photoPreview').src = '/photo.jpg?t=' + Date.now();
  }

  fetch('/api/admin/config').then(function (r) { return r.json(); }).then(function (c) {
    current = c;
    FIELDS.forEach(function (f) { $(f).value = c[f] || ''; });
    $('preview').checked = !!c.preview;
    loadDevices();
  }).catch(function () { say('Could not load settings — is the server running?', false); });

  refreshPhoto();
  $('photoPreview').onerror = function () { this.style.display = 'none'; };
  $('photoPreview').onload = function () { this.style.display = 'block'; };

  $('refreshDevices').addEventListener('click', loadDevices);

  $('uploadPhoto').addEventListener('click', function () {
    var f = $('photoFile').files[0];
    if (!f) return say('Choose an image file first', false);
    $('uploadPhoto').disabled = true;
    fetch('/api/admin/photo', { method: 'POST', body: f })
      .then(function (r) { return r.json(); })
      .then(function (j) {
        $('uploadPhoto').disabled = false;
        if (j.ok) { say('Photo updated', true); refreshPhoto(); }
        else say(j.error || 'Upload failed', false);
      })
      .catch(function () { $('uploadPhoto').disabled = false; say('Upload failed', false); });
  });

  $('save').addEventListener('click', function () {
    var body = {};
    FIELDS.forEach(function (f) { body[f] = $(f).value; });
    body.videoDevice = $('videoDevice').value || current.videoDevice;
    body.audioDevice = $('audioDevice').value || current.audioDevice;
    body.preview = $('preview').checked;
    $('save').disabled = true;
    fetch('/api/admin/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
      .then(function (r) { return r.json(); })
      .then(function (j) {
        $('save').disabled = false;
        if (j.ok) say('Saved — kiosk updates within ~10 s', true);
        else say(j.error || 'Save failed', false);
      })
      .catch(function () { $('save').disabled = false; say('Save failed', false); });
  });
})();
</script>
</body>
</html>
